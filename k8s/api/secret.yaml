apiVersion: v1
kind: Secret
metadata:
  name: atmos-api-secret
  namespace: atmos
type: Opaque
# Replace these with strong random values in production.
# To encode: echo -n "your-secret" | base64
stringData:
  DB_PASSWORD: "atmos"
  JWT_ACCESS_SECRET: "atmos-access-secret-dev-32-chars!!"
  JWT_REFRESH_SECRET: "atmos-refresh-secret-dev-32chars!"
  GOOGLE_CLIENT_ID: ""
  GOOGLE_CLIENT_SECRET: ""
  GOOGLE_REDIRECT_URL: "http://localhost:8080/api/v1/auth/google/callback"
