services:
  postgres:
    image: postgres:16-alpine
    container_name: atmos-postgres
    environment:
      POSTGRES_USER: atmos
      POSTGRES_PASSWORD: atmos
      POSTGRES_DB: atmos_dev
    ports:
      - "5433:5432"
    volumes:
      - atmos_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atmos -d atmos_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atmos-api
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  atmos_pgdata:
