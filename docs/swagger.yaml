host: localhost:8081
info:
  contact:
    email: me.shantnu@gmail.com
    name: Atmos Team
  description: Personal environmental telemetry and carbon intelligence platform.
  license:
    name: MIT
  termsOfService: http://swagger.io/terms/
  title: Atmos API
  version: "1.0"
paths:
  /activities:
    get:
      description: |-
        Returns a paginated list of activities for the authenticated user.
        Returns all activities when from/to are omitted.
      parameters:
      - description: Start date (YYYY-MM-DD)
        in: query
        name: from
        type: string
      - description: End date (YYYY-MM-DD)
        in: query
        name: to
        type: string
      - description: Page size (default 50, max 100)
        in: query
        name: limit
        type: integer
      - description: Page offset (default 0)
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/dto.ActivitiesPage'
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List activities
      tags:
      - activities
    post:
      consumes:
      - application/json
      description: |-
        Records a transport or flight activity and triggers async emission calculation.
        activity_type is derived automatically from transport_mode — do not send it.
      parameters:
      - description: Activity payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/dto.IngestActivityRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/domain.Activity'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Conflict
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Ingest an activity
      tags:
      - activities
  /activities/{id}:
    delete:
      description: Permanently removes an activity and recalculates the affected day's
      parameters:
      - description: Activity UUID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete an activity
      tags:
      - activities
