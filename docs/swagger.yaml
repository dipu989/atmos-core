        type: number
      fare_currency:
        type: string
      id:
        type: string
      kg_co2e:
        description: |-
          KgCO2e is populated via a LEFT JOIN with the emissions table on read.
          It is not a column on activities and must never be written by GORM.
        type: number
      match_confidence:
        type: number
      origin:
        description: Dedup fields — populated by GPS tracking and/or receipt ingestion.
        type: string
      origin_lat:
        type: number
      origin_lng:
        type: number
      provider:
